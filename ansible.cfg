[defaults]
inventory     = inventory.yaml
# FIX: Enable SSH host key checking for security.
# Set to False ONLY in ephemeral dev/lab environments.
host_key_checking = True
serial        = 5
forks         = 5
timeout       = 60

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
