all:
  children:
    masters:
      hosts:
        kube-master-1:
          ansible_host: 192.168.0.106
      vars:
        ansible_ssh_user: ubuntu
        ansible_become: yes
        ansible_python_interpreter: python3
    workers:
      hosts:
        kube-worker-1:
          ansible_host: 192.168.0.110
        kube-worker-2:
          ansible_host: 192.168.0.111
      vars:
        # FIX: Use a consistent user across nodes (avoid mixed ubuntu/vagrant).
        # Override per-host if needed using host_vars/.
        ansible_ssh_user: ubuntu
        ansible_become: yes
        ansible_python_interpreter: python3
