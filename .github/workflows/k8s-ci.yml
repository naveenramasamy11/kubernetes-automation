---
name: Security & Code Validation

"on":
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. SECRET SCANNING — detect hardcoded credentials/tokens
  # ──────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # 2. YAML LINT — syntax & style validation
  # ──────────────────────────────────────────────────────────────
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            rules:
              line-length:
                max: 160
                level: warning
              truthy:
                allowed-values: ['true', 'false', 'yes', 'no']
              comments:
                min-spaces-from-content: 1

  # ──────────────────────────────────────────────────────────────
  # 3. ANSIBLE LINT — security & best-practice rules
  # ──────────────────────────────────────────────────────────────
  ansible-lint:
    name: Ansible Security Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible & ansible-lint
        run: pip install ansible ansible-lint

      - name: Run ansible-lint (security + best-practice profile)
        run: |
          ansible-lint k8s.yaml \
            --profile=security \
            --exclude=.git \
            || echo "ansible-lint completed"

      - name: Ansible playbook syntax check
        run: |
          ansible-playbook --syntax-check k8s.yaml -i inventory.yaml \
            2>&1 | grep -v "WARNING.*not accessible" || true

  # ──────────────────────────────────────────────────────────────
  # 4. IaC SECURITY — Checkov scans Ansible roles & K8s manifests
  # ──────────────────────────────────────────────────────────────
  checkov-scan:
    name: IaC Security Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov on Ansible roles
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: ansible
          soft_fail: true
          output_format: cli
          download_external_modules: false

  # ──────────────────────────────────────────────────────────────
  # 5. KICS — Infrastructure-as-Code vulnerability scanner
  # ──────────────────────────────────────────────────────────────
  kics-scan:
    name: IaC Vulnerability Scan (KICS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run KICS scan
        uses: checkmarx/kics-github-action@v2
        with:
          path: .
          fail_on: high
          output_path: kics-results/
          output_formats: json,sarif
          exclude_paths: ".git,.github"

      - name: Upload KICS SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: kics-results/results.sarif

  # ──────────────────────────────────────────────────────────────
  # 6. SEMGREP — static analysis & misconfiguration detection
  # ──────────────────────────────────────────────────────────────
  semgrep:
    name: Static Analysis (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >
            p/ansible
            p/secrets
            p/insecure-transport
          auditOn: push
