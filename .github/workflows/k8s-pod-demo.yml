name: K8s Pod Demo - Deploy & Show kubectl get pods

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  deploy-and-show-pods:
    name: Deploy nginx & Show kubectl get pods
    runs-on: ubuntu-latest

    steps:
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: demo-cluster

      - name: Wait for node to be Ready
        run: |
          kubectl wait --for=condition=Ready nodes --all --timeout=120s

      - name: Deploy nginx container
        run: |
          kubectl run nginx-demo \
            --image=nginx:1.27-alpine \
            --restart=Never \
            --port=80

      - name: Deploy redis container
        run: |
          kubectl run redis-demo \
            --image=redis:7-alpine \
            --restart=Never \
            --port=6379

      - name: Deploy busybox container
        run: |
          kubectl run busybox-demo \
            --image=busybox:1.36 \
            --restart=Never \
            --command -- sh -c "echo 'BusyBox is running'; sleep 3600"

      - name: Wait for all pods to be Running
        run: |
          kubectl wait --for=condition=Ready pod/nginx-demo   --timeout=90s
          kubectl wait --for=condition=Ready pod/redis-demo   --timeout=90s
          kubectl wait --for=condition=Ready pod/busybox-demo --timeout=90s

      - name: ">>> kubectl get pods <<<"
        run: |
          echo "============================================"
          echo "          kubectl get pods"
          echo "============================================"
          kubectl get pods
          echo ""
          echo "============================================"
          echo "      kubectl get pods -o wide"
          echo "============================================"
          kubectl get pods -o wide

      - name: ">>> kubectl describe pods <<<"
        run: |
          echo "============================================"
          echo "       kubectl describe pods (summary)"
          echo "============================================"
          kubectl get pods -o custom-columns=\
          "NAME:.metadata.name,\
          STATUS:.status.phase,\
          IMAGE:.spec.containers[0].image,\
          NODE:.spec.nodeName,\
          IP:.status.podIP,\
          START_TIME:.status.startTime"

      - name: ">>> Cluster & Node info <<<"
        run: |
          echo "============================================"
          echo "           kubectl get nodes"
          echo "============================================"
          kubectl get nodes -o wide
          echo ""
          echo "============================================"
          echo "           kubectl cluster-info"
          echo "============================================"
          kubectl cluster-info
